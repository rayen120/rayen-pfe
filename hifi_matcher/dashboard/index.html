<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HIFI Matcher - Inspection Exceptions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .hero-bg {
      background-image:
        linear-gradient(to bottom, rgba(5, 15, 45, 0.2), rgba(5, 15, 45, 0.75)),
        url("/assets/hero.png");
      background-size: cover;
      background-position: center;
    }
    .timestamp-clickable { cursor: pointer; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <header class="fixed top-0 z-20 w-full border-b border-blue-900/30 bg-slate-950/95 backdrop-blur">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="text-blue-300 tracking-[0.2em] text-xl font-semibold">LINE 4 MONITORING</div>
      <div class="text-xs text-slate-400">Last updated: <span id="last-updated">--</span></div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 pt-24 pb-8 space-y-6">
    <section class="rounded-xl border border-blue-900/30 overflow-hidden hero-bg min-h-[280px] flex items-end">
      <div class="p-8">
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-rose-900/40 border border-rose-400/30 text-[11px] tracking-widest uppercase text-rose-200 font-semibold">
          <span class="w-2 h-2 rounded-full bg-rose-400"></span>
          Live Feed - Line 4
        </div>
        <h1 class="mt-4 text-4xl md:text-6xl italic font-semibold tracking-tight text-blue-100">
          QUALITY CONTROL MONITORING
        </h1>
        <p class="mt-3 text-sm text-blue-100/70">Only failures are shown (mismatch / missing checks).</p>
      </div>
    </section>

    <section class="rounded-xl border border-slate-800 bg-slate-900 overflow-hidden">
      <div class="px-4 py-3 border-b border-slate-800 flex flex-wrap items-center justify-between gap-2">
        <div class="font-semibold">Inspection Exceptions</div>
        <div class="flex items-center gap-2 text-xs">
          <span id="filter-badge" class="hidden px-2 py-1 rounded border border-cyan-500/50 bg-cyan-900/30 text-cyan-200"></span>
          <button id="clear-filter-btn" class="hidden px-2 py-1 rounded border border-slate-600 text-slate-200 hover:bg-slate-800">
            Show All
          </button>
        </div>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-950/60 text-slate-300">
            <tr>
              <th class="text-left px-4 py-2">Timestamp</th>
              <th class="text-left px-4 py-2">Station</th>
              <th class="text-left px-4 py-2">Target</th>
              <th class="text-left px-4 py-2">Detected</th>
              <th class="text-center px-4 py-2">EAC</th>
              <th class="text-center px-4 py-2">HIFI</th>
              <th class="text-left px-4 py-2">Result</th>
            </tr>
          </thead>
          <tbody id="exceptions-body" class="divide-y divide-slate-800"></tbody>
        </table>
      </div>
      <div id="empty-state" class="hidden px-4 py-8 text-center text-slate-400">
        No exceptions right now.
      </div>
    </section>

    <section class="space-y-3">
      <h2 class="text-lg font-semibold text-rose-300">Client Fail History Log</h2>
      <div id="client-log" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </section>
  </main>

  <script>
    let activeDateFilter = "";

    function icon(ok) {
      return ok
        ? '<span class="text-emerald-400 font-bold">YES</span>'
        : '<span class="text-rose-400 font-bold">NO</span>';
    }

    function escapeHtml(v) {
      return String(v || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function datePart(ts) {
      const m = String(ts || "").match(/^(\d{4}-\d{2}-\d{2})/);
      return m ? m[1] : "";
    }

    function updateFilterUi() {
      const badge = document.getElementById("filter-badge");
      const btn = document.getElementById("clear-filter-btn");
      if (activeDateFilter) {
        badge.textContent = `Filtering by: ${activeDateFilter}`;
        badge.classList.remove("hidden");
        btn.classList.remove("hidden");
      } else {
        badge.classList.add("hidden");
        btn.classList.add("hidden");
      }
    }

    function classifyReason(reason) {
      const r = String(reason || "").toLowerCase();
      if (r.startsWith("live filter:")) {
        if (r.includes("hifi missing")) return { section: "filter", label: "No hifi" };
        if (r.includes("eac missing")) return { section: "filter", label: "Eac missing" };
        if (r.includes("phrase missing")) return { section: "filter", label: "Phrase missing" };
        if (r.includes("ref missing")) return { section: "filter", label: "Ref missing" };
        return { section: "filter", label: "Other issue" };
      }
      if (r.startsWith("selected eticket:")) {
        if (r.includes("hifi missing")) return { section: "eticket", label: "hifi missing" };
        if (r.includes("eac missing")) return { section: "eticket", label: "Eac missing" };
        if (r.includes("phrase missing")) return { section: "eticket", label: "Phrase missing" };
        if (r.includes("ref missing")) return { section: "eticket", label: "Ref missing" };
        return { section: "eticket", label: "Other issue" };
      }
      if (r.includes("reference mismatch")) return { section: "filter", label: "Reffrance Missmatch" };
      return { section: "filter", label: "Other issue" };
    }

    function toCountMap(items) {
      const out = new Map();
      for (const key of items) out.set(key, (out.get(key) || 0) + 1);
      return out;
    }

    function renderClientLog(events) {
      const root = document.getElementById("client-log");
      root.innerHTML = "";
      const grouped = new Map();
      for (const ev of events) {
        const station = String(ev.station || "Unknown");
        if (!grouped.has(station)) grouped.set(station, []);
        grouped.get(station).push(ev);
      }

      const stations = Array.from(grouped.keys()).sort((a, b) => a.localeCompare(b));
      for (const station of stations) {
        const list = grouped.get(station) || [];
        list.sort((a, b) => String(b.timestamp || "").localeCompare(String(a.timestamp || "")));
        const primary = list[0] || {};
        const filterErrs = [];
        const eticketErrs = [];
        for (const ev of list) {
          for (const reason of (Array.isArray(ev.reasons) ? ev.reasons : [])) {
            const c = classifyReason(reason);
            if (c.section === "eticket") eticketErrs.push(c.label);
            else filterErrs.push(c.label);
          }
        }
        const filterCount = toCountMap(filterErrs);
        const eticketCount = toCountMap(eticketErrs);
        const renderCounts = (map, emptyText) => {
          const items = Array.from(map.entries()).sort((a, b) => b[1] - a[1]);
          if (!items.length) return `<div class="text-slate-400">${emptyText}</div>`;
          return items.map(([label, n]) => `<div>${escapeHtml(label)} : ${n} times</div>`).join("");
        };

        root.insertAdjacentHTML("beforeend", `
          <section class="space-y-1 rounded-lg border border-slate-800/80 bg-slate-900/60 p-4">
            <div class="text-xl text-slate-100 font-semibold">${escapeHtml(station)}</div>
            <div class="text-slate-300">Filter Reffrance : <span class="font-semibold">${escapeHtml(primary.target_serial || "-")}</span></div>
            <div class="font-semibold text-slate-100 pt-1">Errors:</div>
            <div class="text-slate-200">printing on the filter</div>
            <div class="pl-4 text-slate-300">${renderCounts(filterCount, "No filter-side errors")}</div>
            <div class="text-slate-200 pt-1">Printed eticket:</div>
            <div class="pl-4 text-slate-300">${renderCounts(eticketCount, "No eticket-side errors")}</div>
          </section>
        `);
      }
    }

    async function loadData() {
      try {
        const res = await fetch("/api/exceptions?ts=" + Date.now(), { cache: "no-store" });
        const payload = await res.json();
        const allEvents = Array.isArray(payload.events) ? payload.events : [];
        const events = activeDateFilter
          ? allEvents.filter(ev => datePart(ev.timestamp) === activeDateFilter)
          : allEvents;
        const body = document.getElementById("exceptions-body");
        const empty = document.getElementById("empty-state");
        body.innerHTML = "";
        updateFilterUi();

        if (!events.length) {
          empty.classList.remove("hidden");
          document.getElementById("client-log").innerHTML = "";
          document.getElementById("last-updated").textContent = new Date().toLocaleTimeString();
          return;
        }
        empty.classList.add("hidden");

        if (!activeDateFilter) {
          const dateMap = new Map();
          for (const ev of events) {
            const d = datePart(ev.timestamp);
            if (!d) continue;
            dateMap.set(d, (dateMap.get(d) || 0) + 1);
          }
          const dates = Array.from(dateMap.entries()).sort((a, b) => b[0].localeCompare(a[0]));
          for (const [d, n] of dates) {
            body.insertAdjacentHTML("beforeend", `
              <tr>
                <td class="px-4 py-2 text-cyan-300 font-semibold timestamp-clickable hover:text-cyan-200" data-date="${escapeHtml(d)}">${escapeHtml(d)}</td>
                <td class="px-4 py-2 text-slate-400">Click date to show details</td>
                <td class="px-4 py-2 text-slate-500">-</td>
                <td class="px-4 py-2 text-slate-500">-</td>
                <td class="px-4 py-2 text-center text-slate-500">-</td>
                <td class="px-4 py-2 text-center text-slate-500">-</td>
                <td class="px-4 py-2"><span class="inline-flex px-2 py-1 rounded bg-slate-800 text-slate-300 border border-slate-700">${n} events</span></td>
              </tr>
            `);
          }
        } else {
          for (const ev of events) {
            const d = datePart(ev.timestamp);
            const tsClasses = d && d === activeDateFilter
              ? "px-4 py-2 text-cyan-300 font-semibold timestamp-clickable"
              : "px-4 py-2 text-slate-300 timestamp-clickable hover:text-cyan-300";
            body.insertAdjacentHTML("beforeend", `
              <tr>
                <td class="${tsClasses}" data-date="${escapeHtml(d)}">${escapeHtml(ev.timestamp)}</td>
                <td class="px-4 py-2">${escapeHtml(ev.station)}</td>
                <td class="px-4 py-2 font-mono text-cyan-300">${escapeHtml(ev.target_serial || "-")}</td>
                <td class="px-4 py-2 font-mono ${ev.target_serial !== ev.detected ? "text-rose-300" : "text-slate-200"}">${escapeHtml(ev.detected || "-")}</td>
                <td class="px-4 py-2 text-center">${icon(!!ev.eac_ok)}</td>
                <td class="px-4 py-2 text-center">${icon(!!ev.hifi_ok)}</td>
                <td class="px-4 py-2"><span class="inline-flex px-2 py-1 rounded bg-rose-900/40 text-rose-300 border border-rose-700/60">${escapeHtml(ev.result || "FAIL")}</span></td>
              </tr>
            `);
          }
        }
        renderClientLog(events);
        body.querySelectorAll("td[data-date]").forEach((cell) => {
          cell.addEventListener("click", () => {
            const d = String(cell.getAttribute("data-date") || "");
            if (!d) return;
            activeDateFilter = d;
            loadData();
          });
        });
        document.getElementById("last-updated").textContent = new Date().toLocaleTimeString();
      } catch (_err) {
        const empty = document.getElementById("empty-state");
        empty.classList.remove("hidden");
        empty.textContent = "Could not load dashboard data.";
      }
    }

    document.getElementById("clear-filter-btn").addEventListener("click", () => {
      activeDateFilter = "";
      loadData();
    });

    loadData();
    setInterval(loadData, 3000);
  </script>
</body>
</html>
